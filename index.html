<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Discipline Tracker</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .app {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 20px;
      width: 320px;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .box {
      padding: 15px;
      border-radius: 10px;
      background: rgba(255,255,255,0.2);
      cursor: pointer;
      transition: 0.3s;
    }

    .box:hover {
      background: rgba(255,255,255,0.4);
    }

    .done {
      background: limegreen !important;
      text-decoration: line-through;
    }

    #noteSection {
      margin-top: 15px;
      display: none;
    }

    input {
      width: 90%;
      padding: 8px;
      border-radius: 8px;
      border: none;
      outline: none;
      color: blue;
    }

    button {
      margin-top: 8px;
      padding: 8px 15px;
      border: none;
      border-radius: 8px;
      background: #00c6ff;
      color: white;
      cursor: pointer;
    }

    .progress {
      margin-top: 10px;
    }

    .reset {
      background: red;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="app">

  <h2>Discipline Tracker</h2>

  <div class="grid" id="grid"></div>

  <div id="noteSection">
    <input type="text" id="noteInput" placeholder="What did you do today?">
    <button onclick="saveNote()">Save</button>
  </div>

  <div class="progress" id="progress"></div>

  <button class="reset" onclick="resetAll()">Reset</button>

</div>

<script>

let currentDay = null;
let data = JSON.parse(localStorage.getItem("tracker")) || {};

const grid = document.getElementById("grid");

// CREATE BOXES
function createBoxes() {
  grid.innerHTML = "";

  for (let i = 1; i <= 10; i++) {
    let box = document.createElement("div");
    box.className = "box";
    box.innerText = "Day " + i;

    if (data[i]) {
      box.classList.add("done");
    }

    box.onclick = () => selectDay(i);

    grid.appendChild(box);
  }
}

// SELECT DAY (STRICT ORDER)
function selectDay(day) {
  let completed = Object.keys(data).length;

  if (day !== completed + 1) {
    alert("Complete Day " + (completed + 1) + " first!");
    return;
  }

  currentDay = day;

  document.getElementById("noteSection").style.display = "block";
  document.getElementById("noteInput").focus();
}

// SAVE NOTE
function saveNote() {
  let note = document.getElementById("noteInput").value.trim();

  if (!note) {
    alert("Write something first!");
    return;
  }

  data[currentDay] = note;

  localStorage.setItem("tracker", JSON.stringify(data));

  document.getElementById("noteInput").value = "";
  document.getElementById("noteSection").style.display = "none";

  createBoxes();
  updateUI();
}

// UPDATE UI
function updateUI() {
  let completed = Object.keys(data).length;

  document.getElementById("progress").innerText =
    "Completed: " + completed + "/10";
}

// RESET BUTTON
function resetAll() {
  if (confirm("Are you sure you want to reset everything?")) {
    localStorage.removeItem("tracker");
    data = {};
    createBoxes();
    updateUI();
  }
}

// INIT
createBoxes();
updateUI();

</script>

</body>
</html>
