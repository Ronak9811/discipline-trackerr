<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discipline Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --card: #161616;
      --border: #2a2a2a;
      --accent: #c8f135;
      --done-bg: #c8f135;
      --done-text: #0d0d0d;
      --text: #f0f0f0;
      --muted: #666;
    }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px 16px 60px;
    }

    .app { width: 100%; max-width: 420px; }
    header { margin-bottom: 32px; }

    .label {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      line-height: 1;
      letter-spacing: 0.03em;
      color: var(--text);
    }

    h1 span { color: var(--accent); }

    .progress-bar-wrap {
      margin-top: 16px;
      background: var(--border);
      border-radius: 100px;
      height: 6px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 100px;
      width: 0%;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
    }

    .progress-text strong { color: var(--accent); font-weight: 600; }

    .section-title {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      margin-top: 28px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .box {
      aspect-ratio: 1;
      border-radius: 12px;
      background: var(--card);
      border: 1.5px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: not-allowed;
      transition: transform 0.12s ease, background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      opacity: 0.4;
    }

    .box.next {
      cursor: pointer;
      opacity: 1;
      border-color: var(--accent);
      box-shadow: 0 0 14px rgba(200, 241, 53, 0.2);
    }

    .box.next .day-num { color: var(--accent); }
    .box.next:active { transform: scale(0.88); }

    .box.done {
      background: var(--done-bg);
      border-color: var(--done-bg);
      box-shadow: 0 0 20px rgba(200, 241, 53, 0.25);
      cursor: default;
      opacity: 1;
    }

    .box .day-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      color: var(--muted);
      line-height: 1;
      transition: font-size 0.25s ease, color 0.25s ease;
    }

    .box .check {
      font-size: 0px;
      position: absolute;
      transition: font-size 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      color: var(--done-text);
    }

    .box.done .day-num { font-size: 0px; }
    .box.done .check { font-size: 20px; }

    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(200, 241, 53, 0.35);
      transform: scale(0);
      animation: ripple-anim 0.45s linear;
      pointer-events: none;
    }

    @keyframes ripple-anim {
      to { transform: scale(4); opacity: 0; }
    }

    .reset-btn {
      margin-top: 28px;
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .reset-btn:hover { border-color: #ff5252; color: #ff5252; }

    .streak-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 100px;
      padding: 6px 14px;
      font-size: 13px;
      color: var(--muted);
      margin-top: 14px;
    }

    .streak-chip .fire { font-size: 16px; }
    .streak-chip strong { color: var(--accent); }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="label">Daily routine</div>
    <h1>DISCIPLINE<br><span>TRACKER</span></h1>
    <div class="streak-chip">
      <span class="fire">🔥</span>
      <span>Current streak: <strong id="streakCount">0</strong> days</span>
    </div>
    <div class="progress-bar-wrap" style="margin-top:16px">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="progress-text">
      <span><strong id="doneCount">0</strong> / <span id="totalCount">30</span> completed</span>
      <span id="pctText">0%</span>
    </div>
  </header>

  <div class="section-title">Days — tap to complete in order</div>
  <div class="grid" id="grid"></div>

  <button class="reset-btn" onclick="resetAll()">↺ Reset All</button>
</div>

<script>
  const TOTAL = 30;
  const STORAGE_KEY = 'discipline_tracker_v3';

  // Wipe old versions
  ['discipline_tracker_v1', 'discipline_tracker_v2'].forEach(k => localStorage.removeItem(k));

  let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { done: [] };

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let audioCtx = null;

  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function playBeep() {
    try {
      const ctx = getCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(660, ctx.currentTime + 0.08);
      gain.gain.setValueAtTime(0.4, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.2);
    } catch(e) {}
  }

  function addRipple(el, e) {
    const rect = el.getBoundingClientRect();
    const x = (e.clientX || rect.left + rect.width / 2) - rect.left;
    const y = (e.clientY || rect.top + rect.height / 2) - rect.top;
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    ripple.style.left = x + 'px';
    ripple.style.top = y + 'px';
    ripple.style.width = ripple.style.height = rect.width + 'px';
    ripple.style.marginLeft = ripple.style.marginTop = -(rect.width / 2) + 'px';
    el.appendChild(ripple);
    setTimeout(() => ripple.remove(), 500);
  }

  function tap(day, el, e) {
    const nextDay = state.done.length + 1;
    if (day !== nextDay) return; // only next in sequence
    state.done.push(day);
    save();
    playBeep();
    addRipple(el, e);
    refreshGrid();
    updateStats();
  }

  function updateStats() {
    const done = state.done.length;
    const pct = Math.round((done / TOTAL) * 100);
    document.getElementById('doneCount').textContent = done;
    document.getElementById('pctText').textContent = pct + '%';
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('streakCount').textContent = done;
  }

  function refreshGrid() {
    const nextDay = state.done.length + 1;
    document.querySelectorAll('.box').forEach((box, i) => {
      const day = i + 1;
      box.className = 'box';
      if (state.done.includes(day)) box.classList.add('done');
      else if (day === nextDay) box.classList.add('next');
    });
  }

  function buildGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    document.getElementById('totalCount').textContent = TOTAL;
    const nextDay = state.done.length + 1;
    for (let i = 1; i <= TOTAL; i++) {
      const box = document.createElement('div');
      let cls = 'box';
      if (state.done.includes(i)) cls += ' done';
      else if (i === nextDay) cls += ' next';
      box.className = cls;
      box.innerHTML = `<span class="day-num">${i}</span><span class="check">✓</span>`;
      box.addEventListener('click', (e) => tap(i, box, e));
      grid.appendChild(box);
    }
    updateStats();
  }

  function resetAll() {
    if (confirm('Reset all progress?')) {
      state.done = [];
      save();
      buildGrid();
    }
  }

  buildGrid();
</script>
</body>
</html>
