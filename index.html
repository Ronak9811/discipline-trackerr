        <!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discipline Tracker</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
    }

    .app {
      width: 100%;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 15px;
      max-width: 600px;
      margin: auto;
    }

    .box {
      padding: 20px;
      border-radius: 15px;
      background: rgba(255,255,255,0.2);
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
    }

    .box:hover {
      background: rgba(255,255,255,0.4);
    }

    .done {
      background: limegreen !important;
      text-decoration: line-through;
    }

    #noteSection {
      margin-top: 25px;
      display: none;
    }

    input {
      width: 60%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      color: blue;
      font-size: 16px;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #00c6ff;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    .notes {
      margin-top: 20px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
      background: rgba(0,0,0,0.2);
      padding: 15px;
      border-radius: 10px;
    }

    .reset {
      background: red;
    }
  </style>
</head>

<body>

<div class="app">

  <h1>Discipline Tracker</h1>

  <div class="grid" id="grid"></div>

  <div id="noteSection">
    <input type="text" id="noteInput" placeholder="What did you do today?">
    <br>
    <button onclick="saveNote()">Save</button>
  </div>

  <div class="notes" id="notesList"></div>

  <button class="reset" onclick="resetAll()">Reset</button>

</div>

<script>

let currentDay = null;
let data = JSON.parse(localStorage.getItem("tracker")) || {};

const grid = document.getElementById("grid");

// CREATE BOXES
function createBoxes() {
  grid.innerHTML = "";

  for (let i = 1; i <= 10; i++) {
    let box = document.createElement("div");
    box.className = "box";
    box.innerText = "Day " + i;

    if (data[i]) {
      box.classList.add("done");
    }

    box.onclick = () => selectDay(i);

    grid.appendChild(box);
  }
}

// SELECT DAY
function selectDay(day) {

  let completed = Object.keys(data).length;

  // Allow viewing old days
  if (data[day]) {
    document.getElementById("noteSection").style.display = "block";
    document.getElementById("noteInput").value = data[day];
    currentDay = day;
    return;
  }

  // Strict order
  if (day !== completed + 1) {
    alert("Complete Day " + (completed + 1) + " first!");
    return;
  }

  currentDay = day;

  document.getElementById("noteSection").style.display = "block";
  document.getElementById("noteInput").value = "";
  document.getElementById("noteInput").focus();
}

// SAVE NOTE
function saveNote() {
  let note = document.getElementById("noteInput").value.trim();

  if (!note) {
    alert("Write something first!");
    return;
  }

  data[currentDay] = note;

  localStorage.setItem("tracker", JSON.stringify(data));

  document.getElementById("noteSection").style.display = "none";

  createBoxes();
  updateNotes();
}

// SHOW ALL NOTES
function updateNotes() {
  let html = "";

  for (let day in data) {
    html += "<b>Day " + day + ":</b> " + data[day] + "<br>";
  }

  document.getElementById("notesList").innerHTML = html;
}

// RESET
function resetAll() {
  if (confirm("Reset everything?")) {
    localStorage.removeItem("tracker");
    data = {};
    createBoxes();
    updateNotes();
  }
}

// INIT
createBoxes();
updateNotes();

</script>

</body>
</html>
