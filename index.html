<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <!-- 🔥 MOST IMPORTANT FOR MOBILE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Discipline Tracker</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* 🔥 MAIN APP BOX */
    .app {
      width: 95%;
      max-width: 420px;
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
    }

    h2 {
      margin-bottom: 15px;
      color: #333;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    /* DAY BOX */
    .box {
      padding: 15px;
      border-radius: 10px;
      background: #e0e0e0;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .box:hover {
      transform: scale(1.05);
    }

    .done {
      background: #00c853 !important;
      color: white;
      text-decoration: line-through;
    }

    /* INPUT AREA */
    #noteSection {
      margin-top: 15px;
      display: none;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      margin-top: 10px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #4facfe;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #2196f3;
    }

    .reset {
      background: #ff5252;
    }

    .notes {
      margin-top: 15px;
      text-align: left;
      max-height: 120px;
      overflow-y: auto;
      font-size: 14px;
    }

  </style>
</head>

<body>

<div class="app">

  <h2>🔥 Discipline Tracker</h2>

  <div class="grid" id="grid"></div>

  <div id="noteSection">
    <input type="text" id="noteInput" placeholder="What did you do today?">
    <button onclick="saveNote()">Save</button>
  </div>

  <div class="notes" id="notesList"></div>

  <button class="reset" onclick="resetAll()">Reset</button>

</div>

<script>

let currentDay = null;
let data = JSON.parse(localStorage.getItem("tracker")) || {};

const grid = document.getElementById("grid");

/* CREATE BOXES */
function createBoxes() {
  grid.innerHTML = "";

  for (let i = 1; i <= 10; i++) {
    let box = document.createElement("div");
    box.className = "box";
    box.innerText = i;

    if (data[i]) box.classList.add("done");

    box.onclick = () => selectDay(i);

    grid.appendChild(box);
  }
}

/* SELECT DAY */
function selectDay(day) {

  let completed = Object.keys(data).length;

  // allow viewing old notes
  if (data[day]) {
    currentDay = day;
    document.getElementById("noteSection").style.display = "block";
    document.getElementById("noteInput").value = data[day];
    return;
  }

  // strict order
  if (day !== completed + 1) {
    alert("Complete Day " + (completed + 1) + " first!");
    return;
  }

  currentDay = day;

  document.getElementById("noteSection").style.display = "block";
  document.getElementById("noteInput").value = "";
  document.getElementById("noteInput").focus();
}

/* SAVE NOTE */
function saveNote() {
  let note = document.getElementById("noteInput").value.trim();

  if (!note) {
    alert("Write something first!");
    return;
  }

  data[currentDay] = note;

  localStorage.setItem("tracker", JSON.stringify(data));

  document.getElementById("noteSection").style.display = "none";

  createBoxes();
  updateNotes();
}

/* SHOW NOTES */
function updateNotes() {
  let html = "";

  for (let day in data) {
    html += "<b>Day " + day + ":</b> " + data[day] + "<br>";
  }

  document.getElementById("notesList").innerHTML = html;
}

/* RESET */
function resetAll() {
  if (confirm("Reset everything?")) {
    localStorage.removeItem("tracker");
    data = {};
    createBoxes();
    updateNotes();
  }
}

/* INIT */
createBoxes();
updateNotes();

</script>

</body>
</html>
