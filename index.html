
<script>

let currentDay = null;
let data = JSON.parse(localStorage.getItem("tracker")) || {};

const grid = document.getElementById("grid");

// Create boxes
for (let i = 1; i <= 10; i++) {
  let box = document.createElement("div");
  box.className = "box";
  box.innerText = "Day " + i;
  box.onclick = () => selectDay(i);

  if (data[i]) {
    box.classList.add("done");
  }

  grid.appendChild(box);
}

function selectDay(day) {

  // 🔥 RULE 1: Only allow next day
  let completedDays = Object.keys(data).length + 1;

  if (day !== completedDays) {
    alert("Complete previous day first!");
    return;
  }

  currentDay = day;

  document.getElementById("noteSection").style.display = "block";
  document.getElementById("noteInput").focus(); // cursor appears
}

function saveNote() {
  let note = document.getElementById("noteInput").value.trim();

  // 🔥 RULE 2: No empty note
  if (!note) {
    alert("Write something before saving!");
    return;
  }

  data[currentDay] = note;

  localStorage.setItem("tracker", JSON.stringify(data));

  document.getElementsByClassName("box")[currentDay - 1]
    .classList.add("done");

  document.getElementById("noteInput").value = "";
  document.getElementById("noteSection").style.display = "none";

  updateUI();
}

function updateUI() {
  let completed = Object.keys(data).length;

  document.getElementById("progress").innerText =
    "Completed: " + completed + "/10";

  let notesHTML = "";

  for (let day in data) {
    notesHTML += "Day " + day + ": " + data[day] + "<br>";
  }

  document.getElementById("notesList").innerHTML = notesHTML;
}

updateUI();

</script>
